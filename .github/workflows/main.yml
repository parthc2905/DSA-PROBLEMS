name: LeetCode Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"   # Runs once daily at 08:00 UTC

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Sync LeetCode submissions
      - name: Sync LeetCode
        uses: joshcai/leetcode-sync@v1.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          destination-folder: leetcode
          verbose: true
          commit-header: "[LeetCode Sync]"

      # 3️⃣ Generate solved problems list
      - name: Update README with solved problems
        run: |
          echo "## 📘 Latest LeetCode Solutions" > temp.md
          echo "" >> temp.md
          echo "| Problem | Link |" >> temp.md
          echo "|--------|------|" >> temp.md
      
          ls leetcode | sort -r | head -n 10 | while read file; do
            name=$(echo "$file" | sed 's/\.[^.]*$//' | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) substr($i,2)}1')   # remove extension
            echo "| $name | [View](leetcode/$file) |" >> temp.md
          done
      
          # Replace section in README
          if grep -q "## 📘 Latest LeetCode Solutions" README.md; then
            sed -i '/## 📘 Latest LeetCode Solutions/,$d' README.md
          fi
      
          cat temp.md >> README.md
          rm temp.md

      # 4️⃣ Commit README changes
      - name: Commit README
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Update README with latest LeetCode problems" || echo "No changes"
          git push
