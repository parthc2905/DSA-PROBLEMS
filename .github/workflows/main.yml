name: LeetCode Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"   # runs daily at 08:00 UTC

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Sync LeetCode submissions
      - name: Sync LeetCode
        uses: joshcai/leetcode-sync@v1.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          destination-folder: leetcode
          verbose: true
          commit-header: "[LeetCode Sync]"

      # 3️⃣ Update README with table
      - name: Update README with solved problems
        run: |
          echo "## 📘 All LeetCode Solutions" > temp.md
          echo "" >> temp.md
          echo "| # | Problem | Link |" >> temp.md
          echo "|---|---------|------|" >> temp.md

          ls leetcode | sort -n | while read file; do
            num=$(echo "$file" | cut -d'-' -f1)

            name=$(echo "$file" | cut -d'-' -f2- \
              | sed 's/\.[^.]*$//' \
              | sed 's/-/ /g' \
              | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) substr($i,2)}1')

            echo "| $num | $name | [View](leetcode/$file) |" >> temp.md
          done

          # Replace old section
          if grep -q "## 📘 All LeetCode Solutions" README.md; then
            sed -i '/## 📘 All LeetCode Solutions/,$d' README.md
          fi

          cat temp.md >> README.md
          rm temp.md

      # 4️⃣ Commit changes
      - name: Commit README
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Update README with LeetCode solutions" || echo "No changes"
          git push
